<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运算符优先级的使用</title>
</head>
<body>

<script type="text/javascript">
    var balance =10;
    var call = 0.2;
    var traffic = 0.5;
    var minutes = (balance-traffic*10)/call;
    document.write("手机话费余额还可以通话"+minutes+"分钟");
</script>
</body>
</html>
