<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>输出红、绿、蓝3种颜色的色值</title>
</head>
<body>
<script type="text/javascript">
    document.write("RBG颜色#6699FF的3种颜色的色值分别为：")
    document.write("<p>R:"+0x66);
    document.write("<br>R:"+0x99);
    document.write("<br>R:"+0xFF);
</script>
    
</body>
</html>
