<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逻辑运算符的使用</title>
</head>
<body>
<script type="text/javascript">
var num = 20;
document.write("num="+num);
document.write("<p>num>0 && num<10的结果：");
document.write(num>0 && num<10); //输出运算结果
document.write("<br>num>0 || num<10的结果：");
document.write(num>0||num<10);//输出字符串
document.write("<br>!num<10的结果：")
document.write(!num<10);//输出预算结果
</script>
</body>
</html>
