<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>将华氏温度转化为摄氏度</title>
</head>
<body>
    <h2>洛杉矶当前气温</h2>
    <script type="text/javascript">
        var degreeF=68; //定义华氏温度的变量
        var degreeC=0;//初始化表示摄氏温度
        degreeC = 5/9*(degreeF-32);//将华氏温度转为摄氏温度
        document.write("华氏温度："+degreeF+"&deg;F")
        //输出华氏温度表示的气温
        document.write("<br>摄氏度："+degreeC+"&deg;C")

    </script>
</body>
</html>
