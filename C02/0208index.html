<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赋值运算符的使用</title>
</head>
<body>
    <script type="text/javascript">
        var a = 2;
        var b = 3;
        document.write("两数字加法运算\n")
        document.write("a=2,b=3"); // 输出a 和b的值
        document.write("<p>"); // 输出段落标记
        document.write("a+=b运算后："); //输出字符串
        a+=b; //执行运算

        document.write("两数字减法运算\n")
        document.write("a="+a); // 输出变量a的值
        document.write("<br>");//输出换行标记
        document.write("a-=b运算后：");//输出字符串
        a-=b; //执行运算

        document.write("两数字乘法运算\n")
        document.write("a="+a); // 输出变量a的值
        document.write("<br>");//输出换行标记
        document.write("a*=b运算后：");//输出字符串
        a*=b;//执行运算

        document.write("两数字加法运算\n")
        document.write("a="+a);//输出此时变量a的值
        document.write("<br>");//输出换行标记
        document.write("a/=b运算后：");//输出字符串
        a/=b;//执行运算

        document.write("两数字加法运算\n")
        document.write("a="+a);//输出此时变量a的值
        document.write("a="+a);//输出此时变量a的值
        document.write("<br>");//输出换行标记
        document.write("a%=b运算后：");//输出字符串
        a%=b;//执行运算
        document.write("a="+a);//输出此时变量a的值
    </script>
</body>
</html>
