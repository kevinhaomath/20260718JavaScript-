<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比较运算符的实用</title>
</head>
<body>
    <script>
        var age =25;
        document.write("age变量的值为："+age);
        document.write("age>20:"); // 输出字符串
        document.write("<br>"); //输出换行符
        document.write("age<20:") //输出字符串
        document.write(age<20); // 输出比较结果
        document.write("<br>"); //输出换行标记
        document.write("age>=20:"); // 输出字符串
        document.write(age>=20); // 输出比较结果
        document.write("age==20:");//输出字符串
        document.write(age==20);//输出比较结果
    </script>
</body>
</html>
