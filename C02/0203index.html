<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>输出奥尼尔的中文名、英文名和别名</title>
    <style type="text/css">
        *{font-size: 18px;}
    </style>
</head>
<body>
    <script type="text/javascript">
        document.write('<pre>'); //输出标记
        document.write('中文名:沙奎尔.奥尼尔'); // 输出中文名
        document.write('\n英文名:shaquille O\'Neal');
        document.write('\n别名：大鲨鱼');
        document.write('</pre>');

    </script>
    
</body>
</html>
