<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>输出球员信息</title>
    <style type="text/css">
        *{
            font-size: 18px;
            line-height: 30px;
        }

    </style>
</head>
<body>
    <h1 style="font-size: 24px;">科比.布莱恩特</h1>
    <script type="text/javascript">
        var alias = "小飞侠";// 定义别名变量
        var height = 198; //定义身高变量
        var score = 33643; //定义总得分变量
        var achievement = "五届NBA总冠军"; //定义主要成就变量
        var position = '得分后卫/小前锋';//定义场上位置
        document.write("别名:");
        document.write(alias);
        document.write("<br>身高：");
        document.write(height);
        document.write("厘米<br>总得分：");
        document.write(score);
        document.write("分<br>主要成就:");
        document.write(achievement);
        document.write("<br>场上位置:");
        document.write(position); //输出变量的position的值
        console.log(position);
    </script>
    
</body>
</html>
